name: Deploy to Lightsail

on:
  push:
    branches: [main]
  workflow_dispatch:  # GitHub UI에서 수동 트리거도 가능

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Decode SSH key (base64)
        id: ssh
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.LIGHTSAIL_SSH_KEY_B64 }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.LIGHTSAIL_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: SSH and run deploy.sh
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }} \
            'set -e && cd ~/doa-md-agent && bash deploy.sh'
