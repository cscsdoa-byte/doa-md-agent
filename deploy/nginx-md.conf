# 정산자동화웹 nginx 설정에 추가할 location 블록.
# 위치: /etc/nginx/sites-available/default (또는 정산자동화웹이 사용 중인 conf 파일)
#
# 정산자동화웹과 같은 server { } 블록 안에 location /md/ 만 추가하면 됨.
# Next.js basePath="/md" 로 빌드되었다는 전제.

# (참고용 — 정산자동화웹 server 블록 안에 들어갈 부분만)
location /md/ {
    proxy_pass http://127.0.0.1:3100/md/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_cache_bypass $http_upgrade;
    proxy_read_timeout 60s;
}

# Next.js 정적 자산 (basePath 적용 시 자동으로 /md/_next/ 경로)
# 위 location /md/ 가 이걸 다 받아서 굳이 별도 location 안 만들어도 됨.
