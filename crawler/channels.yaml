# 행사 모니터링 채널 정의
# 새 채널 추가 = 이 파일에 항목 하나 더 + adapters/<key>.py 에 클래스 추가
#
# adapter:
#   rss        — RSS/Atom 피드 (가장 안전, 로그인 불필요)
#   html       — 정적 HTML 파싱 (httpx + bs4)
#   playwright — 동적/SPA (Playwright, 세션 쿠키 필요할 수 있음)
#
# auth: none | session  ("session" 이면 storage/<key>.json 의 Playwright storageState 재사용)
#
# settle_channels: 정산자동화웹 `/api/dashboard/facets` 의 channels 값과 매핑.
#   마진 계산 시 이 채널들의 정산 데이터로 수수료/택배비 평균치를 가져옴.
#   빈 배열 = 신규 입점(정산 데이터 없음) → default_fee_rate 사용.
#
# default_fee_rate: 정산자동화웹 데이터 없을 때 fallback. 0.0 ~ 1.0.
#
# poll_interval_minutes: 채널 폴링 주기. 작을수록 신규 공고 빨리 잡지만 차단/세션만료 위험↑.
#   RSS(공개) = 짧게 (15~30분), HTML(공개) = 중간 (30~60분),
#   Playwright(로그인) = 길게 (60~180분). 0 = 수동 실행만.

channels:
  - key: naver_smartstore
    name: 네이버 스마트스토어 (쇼핑파트너 공식블로그)
    adapter: rss
    auth: none
    urls:
      list: https://rss.blog.naver.com/naver_seller.xml
    settle_channels: ["스마트스토어", "스스"]   # 정산자동화웹에 두 표기 다 있음 — 동일 채널
    default_fee_rate: 0.0273   # 사용자 시뮬레이터 기준 (2.73%)
    poll_interval_minutes: 20

  - key: kakao_talkstore
    name: 카카오 톡스토어 (커뮤니티 공식 블로그)
    adapter: rss
    auth: none
    urls:
      list: https://kakaotalkstore.tistory.com/rss
    settle_channels: []   # 신규 입점 — 정산 데이터 아직 없음
    default_fee_rate: 0.033   # 사용자 시뮬레이터 기준 (3.3%)
    poll_interval_minutes: 20

  - key: coupang_wing
    name: 쿠팡 Wing
    adapter: playwright
    auth: session
    urls:
      login: https://wing.coupang.com/login
      list:  https://wing.coupang.com/tenants/ms-notice/web/notice
    settle_channels: ["쿠팡"]
    default_fee_rate: 0.106   # 사용자 시뮬레이터 기준 (10.6%)
    poll_interval_minutes: 90

  - key: 11st_soffice
    name: 11번가 셀러오피스
    adapter: playwright
    auth: session
    urls:
      login: https://soffice.11st.co.kr/login/Login.tmall
      list:  https://soffice.11st.co.kr/notice/NoticeList.tmall
    settle_channels: ["11번가"]
    default_fee_rate: 0.13
    poll_interval_minutes: 90

  - key: toss_shopping
    name: 토스쇼핑 판매자센터
    adapter: playwright
    auth: session
    urls:
      login: https://partner.tossshopping.com/login
      list:  https://partner.tossshopping.com/notice
    settle_channels: ["토스쇼핑"]
    # 사용자 시뮬레이터 기준 8% 적용.
    # 회의록(2026-05-20) 참고: 기존 정산 8% + 결제 3% = 11%, 인상 후엔 12% + 3% = 15%.
    # 면제 조건: ① 정산탭 오늘출발 → 정산 면제 (실효 3%) ② 광고 구매건 → 정산 면제.
    default_fee_rate: 0.08    # 사용자 시뮬레이터 기준 (8%)
    poll_interval_minutes: 90

  - key: esmplus
    name: ESM+ (G마켓 + 옥션 통합)
    adapter: playwright
    auth: session
    urls:
      login: https://www.esmplus.com/Member/SignIn/LogOn
      list:  https://www.esmplus.com/Home/Notice
    settle_channels: ["지마켓", "옥션"]   # ESM+ 한 셀러센터로 두 채널 동시관리
    default_fee_rate: 0.13    # 사용자 시뮬레이터 기준 (13%)
    poll_interval_minutes: 90

  - key: ns_homeshopping
    name: NS홈쇼핑 (고객사이트 / 특가왕)
    adapter: playwright            # TODO: 셀러센터 URL 확정 후 결정 (홈쇼핑 채널 — 보통 별도 셀러시스템)
    auth: session
    urls:
      login: null                  # TODO: NS홈쇼핑 셀러 페이지 URL 확정
      list:  null
    settle_channels: []            # 정산자동화웹에 아직 없음 (회의록상 신규/예정 채널)
    default_fee_rate: 0.15         # 사용자 시뮬레이터 기준 (15%)
    poll_interval_minutes: 120
    # 메인 구좌: "특가왕" — 진입 시 가격조정 불가 가능성 있음 (회의록 2026-05-20)
    # 고객사이트 들어가서 구좌 전체 확인 필요

  - key: shoppingnT
    name: 쇼핑엔티
    adapter: playwright            # TODO: 셀러센터 URL 확정 후 결정 (로그인 필요 추정)
    auth: session
    urls:
      login: null                  # TODO 확정 — 후보: https://seller.shoppingnt.com
      list:  null
    settle_channels: ["쇼핑엔티"]
    default_fee_rate: 0.15         # 홈쇼핑 계열 보수적 — 추후 정산 데이터로 교체
    poll_interval_minutes: 120

  - key: fanfandaero
    name: 판판대로 (정부 지원사업 통합 포털, fanfandaero.kr)
    adapter: playwright            # 공고 목록을 JS AJAX로 로드 — 정적 HTML 파싱 안 됨
    auth: none                     # 로그인은 불필요 (공개 콘텐츠, 회원가입은 별도)
    urls:
      list: https://fanfandaero.kr/portal/v2/preSprtBizPbanc.do
    settle_channels: []            # 신규 입점 — 정산 데이터 아직 없음
    default_fee_rate: 0.0
    poll_interval_minutes: 60

  - key: sellernow
    name: 셀러나우 (행사 공고 통합)
    adapter: playwright            # SPA(React) — 정적 HTML 파싱 안 됨, 헤드리스 필요
    auth: none                     # 단, 로그인은 불필요 (공개 콘텐츠)
    urls:
      list: https://www.sellernow.co.kr
      # 카테고리: /?menuId=5,55,56,58,59,61,62 (정확한 카테고리 매핑 미정 — 부트스트랩 시 확정)
    settle_channels: []            # 행사 공고 통합 사이트 — 자체 정산 없음
    default_fee_rate: 0.0
    poll_interval_minutes: 30

  - key: onmd_mdlounge
    name: ONMD MD라운지 (MD 커뮤니티)
    adapter: playwright            # 로그인 필요, RSS 없음
    auth: session
    urls:
      login: https://www.onmd.net/login
      list:  https://www.onmd.net/mdlounge
    settle_channels: []            # MD 커뮤니티 — 자체 정산 없음 (정보 채널)
    default_fee_rate: 0.0
    poll_interval_minutes: 120
    # 행사/제안 관련 카테고리: 홍보&제휴 섹션. 부트스트랩 후 정확한 게시판 URL 확정.

  - key: iboss
    name: 아이보스 (이커머스 커뮤니티)
    adapter: html                  # 로그인 없이 공개. RSS 없음.
    auth: none
    urls:
      # 메인 페이지 인기/트렌딩 기반. 평소 보시는 카테고리 URL이 따로 있으면 교체:
      #   쇼핑몰운영 / 커머스 / 정보공유 등. URL 패턴: /ab-{cat}-{postId}
      list: https://www.i-boss.co.kr/
    settle_channels: []            # 정보/인사이트 채널 — 정산 없음
    default_fee_rate: 0.0
    poll_interval_minutes: 60

# 모니터링 대상 아님 (참고용 — 정산자동화웹에는 잡혀있지만 행사 없음):
#   - 자사몰  : 자체 운영
#   - 문자주문 / 전화주문 : 오프라인
#   - 오늘의집 : 사용자가 모니터링 제외 (2026-05-21)
